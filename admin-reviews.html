<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Admin — Akshay Sharma</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #12121a;
      --border: #2a2a3a;
      --text: #f0f0f5;
      --muted: #9394a5;
      --dim: #6b6c7e;
      --accent: #6366f1;
      --green: #22c55e;
      --red: #ef4444;
      --amber: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 40px 24px; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .login-box { text-align: center; padding: 80px 20px; }
    .btn-google {
      display: inline-flex; align-items: center; gap: 12px;
      padding: 14px 32px; background: white; border: none; border-radius: 12px;
      font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
      color: #1f1f1f; cursor: pointer; transition: all 0.2s;
    }
    .btn-google:hover { background: #f5f5f5; }
    .btn-google svg { width: 20px; height: 20px; }

    .tabs { display: flex; gap: 4px; margin-bottom: 24px; background: var(--card); padding: 4px; border-radius: 10px; width: fit-content; }
    .tab {
      padding: 8px 20px; border: none; background: transparent; color: var(--muted);
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; border-radius: 8px; transition: all 0.2s;
    }
    .tab.active { background: var(--accent); color: white; }
    .tab .badge {
      display: inline-block; background: rgba(255,255,255,0.2); padding: 1px 7px;
      border-radius: 10px; font-size: 11px; margin-left: 6px;
    }

    .review-item {
      background: var(--card); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px; margin-bottom: 12px; transition: all 0.2s;
    }
    .review-top { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .review-avatar {
      width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
    }
    .review-avatar-ph {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: white;
    }
    .review-info { flex: 1; }
    .review-name { font-weight: 600; font-size: 14px; }
    .review-email { font-size: 12px; color: var(--dim); }
    .review-rel { font-size: 11px; color: var(--muted); text-transform: capitalize; }
    .review-stars { color: var(--amber); font-size: 14px; margin-bottom: 8px; }
    .review-body { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
    .review-date { font-size: 11px; color: var(--dim); }
    .review-actions { display: flex; gap: 8px; margin-top: 12px; }
    .btn-action {
      padding: 8px 18px; border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-approve { background: rgba(34,197,94,0.12); color: var(--green); }
    .btn-approve:hover { background: rgba(34,197,94,0.25); }
    .btn-reject { background: rgba(239,68,68,0.12); color: var(--red); }
    .btn-reject:hover { background: rgba(239,68,68,0.25); }
    .btn-unapprove { background: rgba(245,158,11,0.12); color: var(--amber); }
    .btn-unapprove:hover { background: rgba(245,158,11,0.25); }

    .status-badge {
      display: inline-block; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .status-pending { background: rgba(245,158,11,0.12); color: var(--amber); }
    .status-approved { background: rgba(34,197,94,0.12); color: var(--green); }

    .empty { text-align: center; padding: 40px; color: var(--dim); font-size: 14px; }
    .access-denied { text-align: center; padding: 60px; color: var(--red); }
  </style>
</head>
<body>
  <div class="container">
    <h1>Review Admin</h1>
    <p class="subtitle">Approve, reject, and manage portfolio reviews.</p>

    <div id="loginBox" class="login-box">
      <p style="color: var(--muted); margin-bottom: 20px;">Sign in with your admin Google account to manage reviews.</p>
      <button class="btn-google" onclick="adminSignIn()">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign in with Google
      </button>
    </div>

    <div id="adminPanel" style="display:none;">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('pending')" id="tabPending">Pending <span class="badge" id="pendingCount">0</span></button>
        <button class="tab" onclick="switchTab('approved')" id="tabApproved">Approved <span class="badge" id="approvedCount">0</span></button>
      </div>
      <div id="reviewsList"></div>
    </div>

    <div id="accessDenied" class="access-denied" style="display:none;">
      <p>Access denied. This panel is only available to the site admin.</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://vowfihujcrkmgnsigjxm.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvd2ZpaHVqY3JrbWduc2lnanhtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MDk4NTEsImV4cCI6MjA4ODA4NTg1MX0.TEuCa1TOmLp82ZBoWgyBdDY-CjaOoSlWVVEwfdXt_pQ';
    const ADMIN_EMAIL = 'akshaysharma543210@gmail.com';

    const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    let currentTab = 'pending';

    document.addEventListener('DOMContentLoaded', async () => {
      const { data: { session } } = await sb.auth.getSession();
      if (session) handleAuth(session.user);

      sb.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN' && session) handleAuth(session.user);
      });
    });

    function handleAuth(user) {
      document.getElementById('loginBox').style.display = 'none';
      if (user.email === ADMIN_EMAIL) {
        document.getElementById('adminPanel').style.display = 'block';
        loadAllReviews();
      } else {
        document.getElementById('accessDenied').style.display = 'block';
      }
    }

    async function adminSignIn() {
      await sb.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.href }
      });
    }

    async function loadAllReviews() {
      const { data, error } = await sb.from('reviews').select('*').order('created_at', { ascending: false });
      if (error || !data) return;

      const pending = data.filter(r => !r.approved);
      const approved = data.filter(r => r.approved);

      document.getElementById('pendingCount').textContent = pending.length;
      document.getElementById('approvedCount').textContent = approved.length;

      renderReviews(currentTab === 'pending' ? pending : approved);
    }

    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.getElementById(tab === 'pending' ? 'tabPending' : 'tabApproved').classList.add('active');
      loadAllReviews();
    }

    function renderReviews(reviews) {
      const el = document.getElementById('reviewsList');
      if (reviews.length === 0) {
        el.innerHTML = `<div class="empty">No ${currentTab} reviews.</div>`;
        return;
      }

      el.innerHTML = reviews.map(r => {
        const initials = r.reviewer_name.split(' ').map(n => n[0]).join('').toUpperCase();
        const stars = '★'.repeat(r.star_rating) + '<span style="color:var(--dim)">' + '★'.repeat(5 - r.star_rating) + '</span>';
        const date = new Date(r.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });

        return `
          <div class="review-item">
            <div class="review-top">
              ${r.reviewer_avatar_url
                ? `<img class="review-avatar" src="${r.reviewer_avatar_url}" onerror="this.outerHTML='<div class=review-avatar-ph>${initials}</div>'">`
                : `<div class="review-avatar-ph">${initials}</div>`}
              <div class="review-info">
                <div class="review-name">${esc(r.reviewer_name)}</div>
                <div class="review-email">${esc(r.reviewer_email)}</div>
                <div class="review-rel">${esc(r.relationship)}</div>
              </div>
              <span class="status-badge ${r.approved ? 'status-approved' : 'status-pending'}">${r.approved ? 'Live' : 'Pending'}</span>
            </div>
            <div class="review-stars">${stars}</div>
            <div class="review-body">${esc(r.review_text)}</div>
            <div class="review-date">${date}</div>
            <div class="review-actions">
              ${r.approved
                ? `<button class="btn-action btn-unapprove" onclick="toggleApproval('${r.id}', false)">Unapprove</button>`
                : `<button class="btn-action btn-approve" onclick="toggleApproval('${r.id}', true)">Approve</button>`
              }
              <button class="btn-action btn-reject" onclick="deleteReview('${r.id}')">Delete</button>
            </div>
          </div>`;
      }).join('');
    }

    async function toggleApproval(id, approve) {
      await sb.from('reviews').update({ approved: approve }).eq('id', id);
      loadAllReviews();
    }

    async function deleteReview(id) {
      if (!confirm('Delete this review permanently?')) return;
      await sb.from('reviews').delete().eq('id', id);
      loadAllReviews();
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }
  </script>
</body>
</html>
